openapi: 3.0.1
info:
  title: Vibes Mobility API
  version: 1.0.0
  description: API for Vibes Mobility platform
servers:
  - url: http://localhost:8080
paths:
  /authentication/login:
    post:
      tags: [authentication]
      summary: User login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRecord'
      responses:
        '200':
          description: Login successful
        '401':
          description: Unauthorized
  /authentication/refresh:
    post:
      tags: [authentication]
      summary: Refresh JWT token
      responses:
        '200':
          description: Token refreshed
        '401':
          description: Unauthorized
  /fee:
    get:
      tags: [fee]
      summary: Get all fees
      responses:
        '200':
          description: List of all fees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FeeRecord'
        '400':
          description: Bad request
  /fee/checkout:
    get:
      tags: [fee]
      summary: Get fees calculated for a checkout interval
      parameters:
        - in: query
          name: checkoutDate
          required: true
          schema:
            type: string
            format: date-time
          example: '2025-12-20T00:29:00.000Z'
        - in: query
          name: expectedCheckinDate
          required: true
          schema:
            type: string
            format: date-time
          example: '2025-12-23T00:29:00.000Z'
      responses:
        '200':
          description: Fees calculated for the given interval
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CheckoutFeeRecord'
        '400':
          description: Bad request or invalid date format
  /fee/update:
    post:
      tags: [fee]
      summary: Update a single fee
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeeRecord'
            example:
              name: CDMR
              category: Car Group
              interval: Daily
              amount: 150.00
              capAmount: 900.00
      responses:
        '200':
          description: Fee updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeeRecord'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
  /user:
    get:
      tags: [user]
      summary: Get all users
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserRecord'
    post:
      tags: [user]
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRecord'
      responses:
        '201':
          description: User created
        '400':
          description: Bad request
  /user/{id}:
    get:
      tags: [user]
      summary: Get user by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User found
        '404':
          description: Not found
  /checkout:
    get:
      tags: [checkout]
      summary: Search rentals by optional filters
      parameters:
        - in: query
          name: rentalId
          required: false
          schema:
            type: string
          description: Filter by rental ID
        - in: query
          name: firstName
          required: false
          schema:
            type: string
          description: Filter by customer first name (partial match)
        - in: query
          name: lastName
          required: false
          schema:
            type: string
          description: Filter by customer last name (partial match)
        - in: query
          name: mva
          required: false
          schema:
            type: string
          description: Filter by Motor Vehicle Allocation identifier
        - in: query
          name: carGroup
          required: false
          schema:
            type: string
          description: Filter by car group name (e.g. CDMR)
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [Active, Completed, Cancelled]
          description: Filter by rental status
        - in: query
          name: checkoutDateFrom
          required: false
          schema:
            type: string
            format: date-time
          description: Filter rentals checked out on or after this date
        - in: query
          name: checkoutDateTo
          required: false
          schema:
            type: string
            format: date-time
          description: Filter rentals checked out on or before this date
      responses:
        '200':
          description: List of matching rentals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RentalSearchResult'
        '400':
          description: Bad request
    post:
      tags: [checkout]
      summary: Create a new checkout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRecord'
      responses:
        '201':
          description: Checkout created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutResponse'
        '400':
          description: Bad request
        '401':
          description: Unauthorized
  /checkout/{id}:
    get:
      tags: [checkout]
      summary: Get checkout by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Checkout found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RentalDetail'
        '404':
          description: Not found
    put:
      tags: [checkout]
      summary: Update an existing rental
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutRecord'
      responses:
        '200':
          description: Rental updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutResponse'
        '400':
          description: Bad request
        '404':
          description: Rental not found
  /vehicle:
    get:
      tags: [vehicle]
      summary: Get all vehicles, optionally filtered by car group
      parameters:
        - in: query
          name: carGroup
          required: false
          schema:
            type: string
          description: Filter vehicles by car group name (e.g. CDMR)
          example: CDMR
      responses:
        '200':
          description: List of vehicles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VehicleRecord'
        '400':
          description: Bad request
        '404':
          description: No vehicles found for the given car group
        '500':
          description: Server error
  /vehicle/{mva}:
    get:
      tags: [vehicle]
      summary: Get vehicle by MVA
      parameters:
        - in: path
          name: mva
          required: true
          schema:
            type: string
          description: Motor Vehicle Allocation identifier
          example: MVA1
      responses:
        '200':
          description: Vehicle found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleRecord'
        '400':
          description: MVA parameter is required
        '404':
          description: Not found
  /price:
    post:
      tags: [price]
      summary: Calculate net and gross rental price
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckoutPricingRecord'
            example:
              checkoutDate: '2025-12-20T00:00:00.000Z'
              expectedCheckinDate: '2025-12-27T00:00:00.000Z'
              carGroupName: CDMR
              targetSalePrice: null
              grossListSalePrice: null
              additionalFees:
                - name: ChildSeat
                  amount: '0'
                  amountMax: '0'
              discount: null
      responses:
        '200':
          description: Calculated price result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceResultRecord'
        '400':
          description: Bad request or missing parameter
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRecord:
      type: object
      properties:
        email:
          type: string
          example: admin@vibes.de
        password:
          type: string
          example: secret
      required: [email, password]
    FeeRecord:
      type: object
      description: Fee record used for GET /fee and POST /fee/update
      properties:
        name:
          type: string
          example: CDMR
        category:
          $ref: '#/components/schemas/FeeCategoryEnum'
        interval:
          $ref: '#/components/schemas/FeeIntervalEnum'
        amount:
          type: number
          format: decimal
          example: 150.00
        capAmount:
          type: number
          format: decimal
          example: 900.00
      required: [name, category, interval, amount, capAmount]
    CheckoutFeeRecord:
      type: object
      description: Fee entry calculated for a specific checkout interval
      properties:
        feeName:
          type: string
          example: CDMR
        feeCategory:
          $ref: '#/components/schemas/FeeCategoryEnum'
        amountCalculatedOnIntervals:
          type: string
          example: '450.00'
        amountAtCheckout:
          type: string
          example: '450.00'
        maxAmount:
          type: string
          example: '900.00'
      required: [feeName, feeCategory, amountCalculatedOnIntervals, amountAtCheckout, maxAmount]
    PriceResultRecord:
      type: object
      description: Calculated price result returned by POST /price
      properties:
        netPrice:
          type: number
          format: decimal
          example: 600.00
        grossPrice:
          type: number
          format: decimal
          example: 714.00
        taxRate:
          type: number
          format: decimal
          example: 0.19
      required: [netPrice, grossPrice, taxRate]
    VehicleRecord:
      type: object
      description: Frontend-facing vehicle object
      properties:
        mva:
          type: string
          example: MVA1
        carGroup:
          type: string
          example: CDMR
        licensePlate:
          type: string
          example: BH-VM-1
        fuel:
          type: string
          example: Electric
        carModel:
          type: string
          example: Model S
        mileage:
          type: string
          nullable: true
          example: '15000'
        color:
          type: string
          example: Red
        status:
          type: string
          example: Available
        transmission:
          type: string
          example: Automatic
      required: [mva, carGroup, licensePlate, fuel, carModel, color, status, transmission]
    FeeCategoryEnum:
      type: string
      enum:
        - Car Group
        - Additional
    FeeIntervalEnum:
      type: string
      enum:
        - Daily
        - Weekly
        - Weekend
        - One Time
    UserRecord:
      type: object
      properties:
        firstname:
          type: string
        lastname:
          type: string
        password:
          type: string
        email:
          type: string
        roles:
          type: array
          items:
            type: string
      required: [firstname, lastname, password, email, roles]
    CheckoutRecord:
      type: object
      properties:
        checkoutPricingRecord:
          $ref: '#/components/schemas/CheckoutPricingRecord'
        customerRecord:
          $ref: '#/components/schemas/CustomerRecord'
        additionalDriverRecords:
          type: array
          items:
            $ref: '#/components/schemas/AdditionalDriverRecord'
        mva:
          type: string
          description: Motor Vehicle Allocation identifier
          example: MVA1
        paymentRecord:
          $ref: '#/components/schemas/PaymentRecord'
      required: [checkoutPricingRecord, customerRecord, additionalDriverRecords, mva, paymentRecord]
    CheckoutPricingRecord:
      type: object
      properties:
        checkoutDate:
          type: string
          format: date-time
          description: Checkout date and time
          example: '2025-12-20T00:00:00.000Z'
        expectedCheckinDate:
          type: string
          format: date-time
          description: Expected check-in date and time
          example: '2025-12-27T00:00:00.000Z'
        carGroupName:
          type: string
          description: Name of the car group (e.g., CDMR, IDMR)
          example: CDMR
        targetSalePrice:
          type: string
          nullable: true
          description: Target net sale price
        grossListSalePrice:
          type: string
          nullable: true
          description: Gross list sale price
        additionalFees:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/AdditionalFeeRecord'
        discount:
          $ref: '#/components/schemas/DiscountRecord'
      required: [checkoutDate, expectedCheckinDate, carGroupName]
    AdditionalFeeRecord:
      type: object
      properties:
        name:
          type: string
          description: Name of the additional fee
          example: ChildSeat
        amount:
          type: string
          description: Fee amount
          example: '30.00'
        amountMax:
          type: string
          description: Maximum fee amount
          example: '300.00'
      required: [name, amount, amountMax]
    DiscountRecord:
      type: object
      nullable: true
      properties:
        percentage:
          type: string
          description: Discount percentage
          example: '10'
        reason:
          type: string
          description: Reason for discount
          example: Loyalty discount
        user:
          type: string
          description: User who applied the discount
          example: admin@vibes.de
      required: [percentage, reason, user]
    CustomerRecord:
      type: object
      properties:
        driverRecord:
          $ref: '#/components/schemas/DriverRecord'
        personRecord:
          $ref: '#/components/schemas/PersonRecord'
        billingAddressRecord:
          $ref: '#/components/schemas/AddressRecord'
        customerNote:
          type: string
          description: Additional notes about the customer
        driverSameAsRenter:
          type: string
          description: Indicates if the driver is the same as the renter
      required: [driverRecord, personRecord, customerNote, driverSameAsRenter]
    AdditionalDriverRecord:
      type: object
      properties:
        driverRecord:
          $ref: '#/components/schemas/DriverRecord'
        personRecord:
          $ref: '#/components/schemas/PersonRecord'
        customerNote:
          type: string
          description: Notes about the additional driver
      required: [driverRecord, personRecord, customerNote]
    DriverRecord:
      type: object
      properties:
        licenseNumber:
          type: string
          description: Driver's license number
          example: B123456789
        licenseCountry:
          type: string
          description: Country that issued the license
          example: DE
        licenseIssued:
          type: string
          format: date
          description: Date the license was issued
          example: '2015-06-01'
        licenseExpiry:
          type: string
          format: date
          description: License expiration date
          example: '2030-06-01'
        licenseImageBase64:
          type: string
          description: Base64 encoded image of the driver's license
      required: [licenseNumber, licenseCountry, licenseIssued, licenseExpiry, licenseImageBase64]
    PersonRecord:
      type: object
      properties:
        academicTitle:
          type: string
          description: Academic title (e.g., Dr., Prof.)
          nullable: true
        firstName:
          type: string
          example: Max
        lastName:
          type: string
          example: Mustermann
        dob:
          type: string
          format: date
          description: Date of birth
          example: '1990-01-15'
        phone:
          type: string
          example: '+4917612345678'
        email:
          type: string
          format: email
          example: max.mustermann@example.com
        addressRecord:
          $ref: '#/components/schemas/AddressRecord'
        idType:
          type: string
          description: Type of identification (e.g., Passport, ID Card)
          example: Passport
        idNumber:
          type: string
          example: C01X00T47
        idExpiryDate:
          type: string
          format: date
          example: '2030-01-01'
        idImageBase64:
          type: string
          description: Base64 encoded image of the ID
      required: [firstName, lastName, dob, phone, email, addressRecord, idType, idNumber, idExpiryDate, idImageBase64]
    AddressRecord:
      type: object
      properties:
        companyName:
          type: string
          nullable: true
          description: Company name (if applicable)
        street:
          type: string
          description: Street name
          example: Musterstraße
        houseNr:
          type: string
          description: House number
          example: '42'
        zip:
          type: string
          description: ZIP / Postal code
          example: '80331'
        city:
          type: string
          example: München
        country:
          type: string
          example: DE
      required: [street, houseNr, zip, city, country]
    PaymentRecord:
      type: object
      properties:
        cardType:
          type: string
          description: Type of credit card (e.g., Visa, MasterCard)
          example: Visa
        cardNumber:
          type: string
          example: '4111111111111111'
        nameOnCard:
          type: string
          example: MAX MUSTERMANN
        expiryDate:
          type: string
          description: Card expiration date (MM/YY)
          example: 02/26
        cvv:
          type: string
          example: '123'
        amountOnHold:
          type: string
          description: Amount put on hold
          example: '300'
        checkoutGrossAmount:
          type: string
          description: Total gross amount at checkout
          example: '714.00'
        paymentDate:
          type: string
          format: date-time
          example: '2025-12-20T10:00:00.000Z'
        paymentStatus:
          type: string
          description: Status of payment (e.g., On Hold, Completed)
          example: On Hold
        authorizationCode:
          type: string
          example: AUTH123456
      required: [cardType, cardNumber, nameOnCard, expiryDate, cvv, amountOnHold, checkoutGrossAmount, paymentDate, paymentStatus, authorizationCode]
    CheckoutResponse:
      type: object
      properties:
        message:
          type: string
          example: Checkout created successfully
        checkout:
          type: object
          properties:
            firstname:
              type: string
            lastname:
              type: string
            checkoutDateTime:
              type: string
              format: date-time
            expectedCheckinDateTime:
              type: string
              format: date-time
            rentalStatus:
              type: string
              example: Active
    RentalSearchResult:
      type: object
      description: Lightweight rental record for search results
      properties:
        rentalId:
          type: string
          example: 'R00001'
        firstName:
          type: string
          example: Max
        lastName:
          type: string
          example: Mustermann
        carGroup:
          type: string
          example: CDMR
        mva:
          type: string
          example: MVA1
        checkoutDate:
          type: string
          format: date-time
          example: '2025-12-20T10:00:00.000Z'
        checkinDate:
          type: string
          format: date-time
          example: '2025-12-27T10:00:00.000Z'
        status:
          type: string
          example: Active
        grossAmount:
          type: string
          example: '714.00'
      required: [rentalId, firstName, lastName, carGroup, mva, checkoutDate, checkinDate, status, grossAmount]
    RentalDetail:
      type: object
      description: Full rental record returned by GET /checkout/{id}
      properties:
        rentalId:
          type: string
          example: 'R00001'
        checkoutPricingRecord:
          $ref: '#/components/schemas/CheckoutPricingRecord'
        customerRecord:
          $ref: '#/components/schemas/CustomerRecord'
        additionalDriverRecords:
          type: array
          items:
            $ref: '#/components/schemas/AdditionalDriverRecord'
        mva:
          type: string
          example: MVA1
        paymentRecord:
          $ref: '#/components/schemas/PaymentRecord'
      required: [rentalId, checkoutPricingRecord, customerRecord, additionalDriverRecords, mva, paymentRecord]
